<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up</title>
   
</head>
<body class="login-register">
    <div class="login-register-card">
        <form id="registerForm">
            <div class="login-register-heading">
            <a href="/index.html"><img src="images/icon.png" alt="cafeteria"></a><h2>Sign Up</h2>
            </div>
            <input type="text" id="name" placeholder="Enter your Name">
            <input type="email" id="email" placeholder="Enter your Email">
            <input type="text" id="contact" placeholder="Enter your Contact">
            <input type="password" id="password" placeholder="Enter your Password">
            <button type="submit" class="register-btn">Register</button>
            <p>Already have an account <a href="/login.html" >Login</a> here</p>
        </form>
        <div id="message"></div>
    </div>
    <script src="./register.js"></script>
</body>
</html>
